<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Shop | StationeryPro IMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#FDFCF0] min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full">
        <div class="text-center mb-6">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="bg-orange-500 p-2 rounded-lg shadow-md">
                    <i class="fas fa-pen-nib text-white text-xl"></i>
                </div>
                <span class="text-2xl font-black text-slate-900">Stationery<span class="text-orange-500">Pro</span></span>
            </a>
            <h2 class="text-2xl font-bold text-slate-800 mt-4">Create Your Shop Account</h2>
            <p class="text-slate-500">Join hundreds of stationery retailers managing stock better.</p>
        </div>

        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl shadow-orange-100 border border-orange-50">
            <form id="registrationForm" class="space-y-5" method="post">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Stationery Shop Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-store"></i>
                        </span>
                        <input type="text" id="shopName" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" 
                            placeholder="e.g. Blue Ink Stationery Hub">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Owner Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" 
                            placeholder="name@shop.com">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                        <input type="password" id="password" required
                            class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" 
                            placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Confirm Password</label>
                        <input type="password" id="confirmPassword" required
                            class="block w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" 
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-start">
                    <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 text-orange-500 border-slate-300 rounded">
                    <label for="terms" class="ml-2 text-sm text-slate-600">
                        I agree to the <a href="#" class="text-orange-600 underline">Terms of Service</a> and Privacy Policy.
                    </label>
                </div>

                <button type="submit" 
                    class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-orange-600 transition-all shadow-lg active:scale-95">
                    Create Account
                </button>
            </form>

            <p class="text-center text-slate-600 font-medium mt-8">
                Already have a shop? 
                <a href="/login" class="text-slate-900 font-bold hover:underline">Login here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const shopName = document.getElementById('shopName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ shopName, email, password })
            });

            const data = await response.json();
            if (response.status === 201) {
                alert(data.message);
                window.location.href = '/setup'; // Proceed to Page 4
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>
