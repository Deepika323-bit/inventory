<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StationeryPro IMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#FDFCF0] min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="/index" class="inline-flex items-center gap-2 group">
                <div class="bg-orange-500 p-2 rounded-lg shadow-md group-hover:bg-orange-600 transition">
                    <i class="fas fa-pen-nib text-white text-xl"></i>
                </div>
                <span class="text-2xl font-black text-slate-900">Stationery<span class="text-orange-500">Pro</span></span>
            </a>
            <p class="text-slate-500 mt-3 font-medium">Welcome back! Please login to your shop.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl shadow-orange-100 border border-orange-50">
            <form action="/dashboard" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="email">
                        Email Address
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition outline-none" 
                            placeholder="admin@yourshop.com">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-bold text-slate-700" for="password">
                            Password
                        </label>
                        <a href="#" class="text-xs font-bold text-orange-600 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition outline-none" 
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-orange-500 border-slate-300 rounded focus:ring-orange-500">
                    <label for="remember" class="ml-2 text-sm text-slate-600 font-medium">Keep me logged in</label>
                </div>

                <button type="submit" 
                    class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-lg hover:bg-orange-600 transition-all shadow-lg active:scale-95">
                    Sign In
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-400 uppercase tracking-widest text-xs">or</span></div>
            </div>

            <p class="text-center text-slate-600 font-medium">
                New to StationeryPro? 
                <a href="/register" class="text-orange-600 font-bold hover:underline">Create an account</a>
            </p>
        </div>

        <p class="text-center text-slate-400 text-xs mt-8">
            &copy; 2026 StationeryPro IMS • Secure Client Portal
        </p>
    </div>
    <script>
    const loginForm = document.querySelector('form');
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (response.ok) {
            window.location.href = '/dashboard'; 
        } else {
            alert(data.message);
        }
    });
</script>
    
</body>
</html>
