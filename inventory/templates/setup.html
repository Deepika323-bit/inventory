<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Shop Profile | StationeryPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#FDFCF0] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-white rounded-[2.5rem] shadow-xl shadow-orange-100/50 border border-orange-50 overflow-hidden">
        <div class="h-2 w-full bg-orange-100">
            <div class="h-full bg-orange-500 w-2/3"></div>
        </div>

        <div class="p-10 md:p-14">
            <div class="mb-10 text-center">
                <h1 class="text-3xl font-black text-slate-900 mb-2">Complete Your Profile</h1>
                <p class="text-slate-500 font-medium">Let's set up your shop's official business details.</p>
            </div>

            <form action="/setup" method="POST" class="space-y-6">
                <div class="flex flex-col items-center mb-8">
                    <div class="w-24 h-24 bg-orange-50 rounded-3xl border-2 border-dashed border-orange-200 flex items-center justify-center text-orange-400 relative group cursor-pointer hover:bg-orange-100 transition">
                        <i class="fas fa-camera text-2xl"></i>
                        <input type="file" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <span class="text-xs font-bold text-slate-400 mt-3 uppercase tracking-widest">Upload Shop Logo</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-black text-slate-700 mb-2 uppercase tracking-tighter">Contact Number</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><i class="fas fa-phone"></i></span>
                            <input type="text" name="phone" required class="w-full pl-10 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="+91 00000 00000">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-black text-slate-700 mb-2 uppercase tracking-tighter">GSTIN / Tax ID</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><i class="fas fa-id-card"></i></span>
                            <input type="text" name="tax_id" class="w-full pl-10 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="22AAAAA0000A1Z5">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-black text-slate-700 mb-2 uppercase tracking-tighter">Shop Address</label>
                    <div class="relative">
                        <span class="absolute top-4 left-0 pl-4 text-slate-400"><i class="fas fa-map-marker-alt"></i></span>
                        <textarea name="address" rows="3" required class="w-full pl-10 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Enter full shop address..."></textarea>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-6">
                    <a href="/dashboard" class="text-slate-400 font-bold hover:text-slate-600">Skip for now</a>
                    <button type="submit" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-lg hover:bg-orange-600 transition-all shadow-lg hover:scale-105 active:scale-95" onclick="gotodash()">
                        Finish Setup <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
<script>
    function gotodash(){
        window.location.href = "/dashboard";
    }
</script>
</script>
</html>
